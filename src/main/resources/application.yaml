geolocation:
  directory: ${user.home}/.geolocation-mcp
  githubApiBaseUrl: https://api.github.com
  githubRepo: P3TERX/GeoLite.mmdb
  githubToken: ${GEOMCP_GH_TOKEN:}
  torBaseUrl: https://check.torproject.org
  torRefreshCron: 0 0 0 * * *
  x4bNetBaseUrl: https://raw.githubusercontent.com
  x4bNetRefreshCron: 0 0 1 * * *
logging:
  include-application-name: false
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
server:
  compression:
    additional-mime-types: application/x-ndjson,text/event-stream
    enabled: true
  forward-headers-strategy: native
  port: 8080
  ssl:
    enabled: false
spring:
  ai:
    mcp:
      server:
        name: geolocation-mcp
        protocol: streamable
        type: async
  application:
    name: geolocation-mcp
  config:
    activate:
      on-profile: default
  devtools:
    restart:
      enabled: false
  main:
    banner-mode: off
  output:
    ansi:
      enabled: always
springdoc:
  api-docs:
    path: /api-docs
  packagesToScan: com.hamza
  pathsToMatch: /**
  swagger-ui:
    disable-swagger-default-url: true
    doc-expansion: none
    operationsSorter: method
    path: /swagger-ui
    tagsSorter: alpha
---
spring:
  config:
    activate:
      on-profile: native
  devtools:
    add-properties: false
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
