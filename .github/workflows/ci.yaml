name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [dev]

jobs:
  check-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6

      - name: Cache GeoLite DBs
        uses: actions/cache@v5
        with:
          path: ~/.geolocation-mcp
          key: geolite-db-${{ runner.os }}

      - name: Kotlin lint check
        run: ./gradlew ktlintCheck -x processAot -x processTestAot -x npm_run_format
        if: github.event_name == 'pull_request'

      - name: Tests without AOT
        run: ./gradlew clean test -x processAot -x processTestAot -x npm_run_format
        env:
          GEOMCP_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: JaCoCo badge
        uses: cicirello/jacoco-badge-generator@v2
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        with:
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv

      - name: Commit badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/jacoco.svg
          git diff --staged --quiet || git commit -m "ci: update coverage badge [skip ci]"
          git push

  build-publish:
    needs: check-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Tests with AOT/tracing-agent and building jar
        run: ./gradlew clean build -PgenerateMetadata -x npm_run_format

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag version
        id: version
        run: echo "version=$(grep '^version' build.gradle.kts | grep -oP '"\K[^"]*')" >> $GITHUB_OUTPUT

      - name: Build native image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: |
            docker.io/7mza/geolocation-mcp:${{ steps.version.outputs.version }}
            docker.io/7mza/geolocation-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker scout vulnerability scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://docker.io/7mza/geolocation-mcp:${{ steps.version.outputs.version }}
          only-severities: critical,high,medium
          exit-code: true

      - name: Push to DockerHub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          sbom: true
          provenance: true
          tags: |
            docker.io/7mza/geolocation-mcp:${{ steps.version.outputs.version }}
            docker.io/7mza/geolocation-mcp:latest
          cache-from: type=gha
